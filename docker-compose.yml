services:
  # Main FastAPI application - connects to host MongoDB via IP
  bookstore-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore-app
    ports:
      - "8001:8000"
    env_file:
      - server/.env
    environment:
      # Service account credentials path for ADC
      GOOGLE_APPLICATION_CREDENTIALS: /app/creds/personal-data-269621-e25f6357800e.json
      # Vertex AI configuration (service accounts require Vertex AI, not the Developer API)
      GOOGLE_CLOUD_PROJECT: personal-data-269621
      GOOGLE_CLOUD_LOCATION: us-central1
      # Unset the blocked API key so genai.Client doesn't auto-detect it
      GOOGLE_API_KEY: ""
    volumes:
      # Mount Google Cloud credentials
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./creds}:/app/creds:ro
      # Mount templates for development
      - ./server/templates:/app/templates
    networks:
      - bookstore-network
    restart: unless-stopped
    # Add extra host for compatibility
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  bookstore-network:
    driver: bridge